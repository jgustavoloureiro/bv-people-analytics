name: People Analytics Pipeline — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Simula execução diária às 06h BRT (09h UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: 'Executar pipeline completo (Bronze → Gold)?'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ─── JOB 1: QUALIDADE DE CÓDIGO ─────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8 black isort pylint

      - name: Flake8 (linting)
        run: |
          flake8 pipeline/scripts/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__

      - name: Black (format check)
        run: black --check --line-length 120 pipeline/scripts/ tests/

      - name: isort (import ordering)
        run: isort --check-only --line-length 120 pipeline/scripts/ tests/

  # ─── JOB 2: TESTES DE PIPELINE ──────────────────────────────────────────────
  pipeline-tests:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas numpy scikit-learn openpyxl \
            pytest pytest-cov pytest-html \
            great-expectations

      - name: Gerar dados Bronze (sintéticos)
        run: python pipeline/scripts/00_bronze_hris.py

      - name: Rodar pipeline Silver
        run: python pipeline/scripts/01_silver_tratamento.py

      - name: Rodar pipeline Gold (séries + modelo)
        run: |
          python pipeline/scripts/02_gold_series.py
          python pipeline/scripts/03_modelo_attrition.py

      - name: Executar suite de testes
        run: |
          pytest tests/ \
            -v \
            --cov=pipeline/scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --html=test-report.html \
            --self-contained-html

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: pipeline
          name: people-analytics-coverage

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            test-report.html
            htmlcov/

  # ─── JOB 3: VALIDAÇÃO DO DASHBOARD ──────────────────────────────────────────
  dashboard-validate:
    name: Dashboard Validation
    runs-on: ubuntu-latest
    needs: pipeline-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jsdom
        run: npm install jsdom

      - name: Validar sintaxe HTML/JS
        run: |
          node -e "
          const { JSDOM } = require('jsdom');
          const fs = require('fs');
          const html = fs.readFileSync('dashboard/index.html', 'utf-8');
          const dom = new JSDOM(html, { runScripts: 'dangerously' });
          setTimeout(() => {
            const w = dom.window;
            if (typeof w.entrar !== 'function') {
              console.error('ERRO: função entrar não definida');
              process.exit(1);
            }
            console.log('Dashboard validado com sucesso');
          }, 1000);
          " 2>&1 | grep -v 'Could not load'

      - name: Verificar tamanho do dashboard
        run: |
          SIZE=$(wc -c < dashboard/index.html)
          echo "Tamanho do dashboard: ${SIZE} bytes"
          if [ $SIZE -lt 100000 ]; then
            echo "ERRO: Dashboard muito pequeno (< 100KB) — possível arquivo incompleto"
            exit 1
          fi
          if [ $SIZE -gt 5000000 ]; then
            echo "AVISO: Dashboard muito grande (> 5MB)"
          fi

  # ─── JOB 4: PUBLISH (GitHub Pages) ──────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [pipeline-tests, dashboard-validate]
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Preparar conteúdo para Pages
        run: |
          mkdir -p _site
          cp dashboard/index.html _site/
          # Gera um index básico se houver múltiplos arquivos
          echo '<meta http-equiv="refresh" content="0;url=index.html">' > _site/redirect.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── JOB 5: SECURITY SCAN ────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bandit (Python security linter)
        uses: jpetrucciani/bandit-check@main
        with:
          path: 'pipeline/scripts'
          bandit_flags: '-ll'   # reporta apenas HIGH e MEDIUM
